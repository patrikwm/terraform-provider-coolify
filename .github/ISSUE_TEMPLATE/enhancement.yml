---
name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement! Please fill out this form as completely as possible.

        Before submitting, please search [existing issues](https://github.com/patrikwm/terraform-provider-coolify/issues?q=is%3Aissue) to see if someone else has already requested this feature.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This enhancement relates to the Coolify API capabilities
          required: false

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature or enhancement you'd like to see
      placeholder: Describe the feature you're requesting
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this feature? What problem does it solve?
      placeholder: |
        Describe your use case:
        - What are you trying to accomplish?
        - How would this feature help?
        - Are there workarounds currently?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?
      placeholder: |
        Describe your proposed solution:
        - New resource/data source?
        - New attribute on existing resource?
        - Enhanced functionality?
    validations:
      required: false

  - type: textarea
    id: example-config
    attributes:
      label: Example Terraform Configuration
      description: If applicable, show how you'd like to use this feature in Terraform
      render: hcl
      placeholder: |
        resource "coolify_example" "new_feature" {
          # your proposed configuration
        }
    validations:
      required: false

  - type: textarea
    id: coolify-api
    attributes:
      label: Coolify API Support
      description: |
        Does the Coolify API support this feature?
        Link to API documentation if available: https://coolify.io/docs/api-reference/
      placeholder: |
        - API endpoint: POST /api/v1/...
        - Documentation: https://coolify.io/docs/api-reference/...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions or workarounds have you considered?
      placeholder: Describe any alternatives you've thought about
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other context, screenshots, or examples about the feature request
      placeholder: Any additional information
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR to implement this feature
          required: false
